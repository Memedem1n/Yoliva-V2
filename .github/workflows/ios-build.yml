name: Yoliva iOS Build (Sideloadly)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build Unsigned iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Convert Logo to Multiple Sizes
        run: |
          SOURCE_LOGO="./mobile/ios/Yoliva/Yoliva/Assets.xcassets/AppIcon.appiconset/Logo.jpg"
          DEST_DIR="./mobile/ios/Yoliva/Yoliva/Assets.xcassets/AppIcon.appiconset"
          
          # Generate Standard iOS Sizes
          sips -z 40 40   "$SOURCE_LOGO" --out "$DEST_DIR/Icon-20@2x.png"
          sips -z 60 60   "$SOURCE_LOGO" --out "$DEST_DIR/Icon-20@3x.png"
          sips -z 58 58   "$SOURCE_LOGO" --out "$DEST_DIR/Icon-29@2x.png"
          sips -z 87 87   "$SOURCE_LOGO" --out "$DEST_DIR/Icon-29@3x.png"
          sips -z 80 80   "$SOURCE_LOGO" --out "$DEST_DIR/Icon-40@2x.png"
          sips -z 120 120 "$SOURCE_LOGO" --out "$DEST_DIR/Icon-40@3x.png"
          sips -z 120 120 "$SOURCE_LOGO" --out "$DEST_DIR/Icon-60@2x.png"
          sips -z 180 180 "$SOURCE_LOGO" --out "$DEST_DIR/Icon-60@3x.png"
          sips -z 1024 1024 "$SOURCE_LOGO" --out "$DEST_DIR/Icon-1024.png"
          
          # General Logo for App usage
          sips -s format png ./mobile/ios/Yoliva/Yoliva/Assets.xcassets/Logo.imageset/Logo.jpg --out ./mobile/ios/Yoliva/Yoliva/Assets.xcassets/Logo.imageset/Logo.png

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        working-directory: ./mobile/ios/Yoliva
        run: xcodegen generate

      - name: Build Unsigned App
        working-directory: ./mobile/ios/Yoliva
        run: |
          xcodebuild clean build \
            -project Yoliva.xcodeproj \
            -scheme Yoliva \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_DIR="${{ github.workspace }}/build"

      - name: Package as .ipa
        run: |
          mkdir -p Payload
          mv ${{ github.workspace }}/build/Release-iphoneos/Yoliva.app Payload/
          zip -qr Yoliva.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Yoliva-iOS-App
          path: Yoliva.ipa
          retention-days: 7
